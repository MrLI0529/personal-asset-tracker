// ======================
// 新增：智能财务评价
// ======================
function generateEvaluation() {
  const totalAsset = assets.reduce((s, i) => s + Number(i.val), 0);
  const totalDebt = debts.reduce((s, i) => s + Number(i.val), 0);
  const netAsset = totalAsset - totalDebt;
  const totalIncome = incomes.reduce((s, i) => s + Number(i.val), 0);
  const totalExpense = expenses.reduce((s, i) => s + Number(i.val), 0);
  const balance = totalIncome - totalExpense;
  const debtRatio = totalAsset > 0 ? (totalDebt / totalAsset) * 100 : 0;

  let level = "";
  let desc = "";

  if (totalAsset === 0 && totalIncome === 0) {
    document.getElementById('evaluationText').innerText = "请填写资产、负债、收入、支出数据，系统将自动生成专业财务评价。";
    return;
  }

  // 评价逻辑
  if (netAsset > 0 && balance > 0 && debtRatio < 40) {
    level = "🌟 财务状况：优秀";
    desc = `你的财务结构非常健康！
• 净资产为正，资产实力稳健。
• 负债率仅${debtRatio.toFixed(1)}%，负债压力极低。
• 每月稳定盈余¥${balance.toFixed(2)}，具备良好储蓄与投资能力。
整体财务安全度高，抗风险能力强，可持续保持。`;
  } 
  else if (netAsset >= 0 && balance >= 0) {
    level = "✅ 财务状况：良好";
    desc = `你的财务状况整体稳健，处于健康区间。
• 资产可以覆盖负债，无资不抵债风险。
• 每月收支基本平衡或略有盈余。
• 负债率${debtRatio.toFixed(1)}%，处于可控范围。
建议继续保持储蓄习惯，逐步提升净资产规模。`;
  } 
  else if (balance > 0 || netAsset > -50000) {
    level = "⚠️ 财务状况：一般，需优化";
    desc = `你的财务状况基本平稳，但存在优化空间。
• 当前净资产¥${netAsset.toFixed(2)}，需逐步提升。
• 负债率${debtRatio.toFixed(1)}%，建议适当控制负债。
• 月收支差额¥${balance.toFixed(2)}，可进一步优化支出结构，提高储蓄率。
建议减少非必要支出，逐步积累资产。`;
  } 
  else {
    level = "🔴 财务状况：存在风险";
    desc = `你的财务结构存在一定压力，需要及时调整。
• 净资产为负，负债超过资产，存在偿债压力。
• 每月支出大于收入，长期可能导致负债持续增加。
• 负债率${debtRatio.toFixed(1)}%，风险偏高。
建议立即优化支出结构，增加收入来源，逐步降低负债。`;
  }

  document.getElementById('evaluationText').innerText = level + "\n" + desc;
}

// 初始化格式选择显示

// 格式化明细数据为易读文本
function formatListData(list, type) {
  if (list.length === 0) return `暂无${type}数据`;
  return list.map(item => `• ${item.name}：¥${Number(item.val).toFixed(2)}`).join('\n');
}

// 生成自定义格式文本
function generateCustomFormat(data) {
  let template = document.getElementById('formatTemplate').value.trim();
  
  // 替换所有变量
  template = template.replace(/{date}/g, data.date)
                     .replace(/{totalAsset}/g, data.totalAsset.toFixed(2))
                     .replace(/{totalDebt}/g, data.totalDebt.toFixed(2))
                     .replace(/{netAsset}/g, data.netAsset.toFixed(2))
                     .replace(/{totalIncome}/g, data.totalIncome.toFixed(2))
                     .replace(/{totalExpense}/g, data.totalExpense.toFixed(2))
                     .replace(/{balance}/g, data.balance.toFixed(2))
                     .replace(/{assets}/g, formatListData(assets, '资产'))
                     .replace(/{debts}/g, formatListData(debts, '负债'))
                     .replace(/{incomes}/g, formatListData(incomes, '收入'))
                     .replace(/{expenses}/g, formatListData(expenses, '支出'));
  
  return template;
}

// 生成CSV格式数据
function generateCSVData() {
  // 表头
  let csvContent = "类型,名称,金额\n";
  
  // 资产
  assets.forEach(item => {
    csvContent += `资产,${item.name},${Number(item.val).toFixed(2)}\n`;
  });
  
  // 负债
  debts.forEach(item => {
    csvContent += `负债,${item.name},${Number(item.val).toFixed(2)}\n`;
  });
  
  // 收入
  incomes.forEach(item => {
    csvContent += `收入,${item.name},${Number(item.val).toFixed(2)}\n`;
  });
  
  // 支出
  expenses.forEach(item => {
    csvContent += `支出,${item.name},${Number(item.val).toFixed(2)}\n`;
  });
  
  return csvContent;
}

// 保存数据到文件
function saveData() {
  const formatType = document.getElementById('saveFormatType').value;
  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN');
  const fileName = `个人财务数据_${now.getTime()}`;
  
  // 计算汇总数据
  const totalAsset = assets.reduce((s, i) => s + Number(i.val), 0);
  const totalDebt = debts.reduce((s, i) => s + Number(i.val), 0);
  const netAsset = totalAsset - totalDebt;
  const totalIncome = incomes.reduce((s, i) => s + Number(i.val), 0);
  const totalExpense = expenses.reduce((s, i) => s + Number(i.val), 0);
  const balance = totalIncome - totalExpense;

  let fileContent, fileExt;
  
  // 根据选择的格式生成内容
  switch(formatType) {
    case 'json':
      fileContent = JSON.stringify({
        date: dateStr,
        totalAsset,
        totalDebt,
        netAsset,
        totalIncome,
        totalExpense,
        balance,
        assets,
        debts,
        incomes,
        expenses
      }, null, 2);
      fileExt = 'json';
      break;
      
    case 'csv':
      fileContent = generateCSVData();
      fileExt = 'csv';
      break;
      
    case 'custom':
      fileContent = generateCustomFormat({
        date: dateStr,
        totalAsset,
        totalDebt,
        netAsset,
        totalIncome,
        totalExpense,
        balance
      });
      fileExt = 'txt';
      break;
  }

  // 创建下载链接
  const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${fileName}.${fileExt}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  alert(`数据已保存为 ${fileName}.${fileExt}`);
}

// 导入数据
function loadData() {
  // 创建文件选择器
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,.csv,.txt';
  
  input.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(event) {
      try {
        let content = event.target.result;
        
        // 优先尝试JSON解析（兼容所有导出格式）
        if (file.name.endsWith('.json')) {
          const data = JSON.parse(content);
          assets = data.assets || [];
          debts = data.debts || [];
          incomes = data.incomes || [];
          expenses = data.expenses || [];
        } 
        // CSV格式解析（仅支持基础明细导入）
        else if (file.name.endsWith('.csv')) {
          const lines = content.split('\n').filter(line => line.trim() && !line.startsWith('类型,名称,金额'));
          assets = [];
          debts = [];
          incomes = [];
          expenses = [];
          
          lines.forEach(line => {
            const [type, name, val] = line.split(',');
            if (!type || !name || isNaN(val)) return;
            
            const item = { name: name.trim(), val: Number(val) };
            switch(type.trim()) {
              case '资产': assets.push(item); break;
              case '负债': debts.push(item); break;
              case '收入': incomes.push(item); break;
              case '支出': expenses.push(item); break;
            }
          });
        }
        // 自定义文本格式暂不支持导入（提示用户使用JSON）
        else {
          alert('自定义文本格式暂不支持导入，请使用JSON格式备份/恢复数据');
          return;
        }
        
        // 保存到本地存储并刷新页面
        localStorage.setItem('assets', JSON.stringify(assets));
        localStorage.setItem('debts', JSON.stringify(debts));
        localStorage.setItem('incomes', JSON.stringify(incomes));
        localStorage.setItem('expenses', JSON.stringify(expenses));
        
        calc();
        alert('数据导入成功！');
        
      } catch (error) {
        alert(`数据导入失败：${error.message}\n请确保文件格式正确`);
      }
    };
    
    reader.readAsText(file, 'UTF-8');
  });
  
  input.click();
}

function calc(){
  const totalAsset = assets.reduce((s,i)=>s+Number(i.val),0)
  const totalDebt = debts.reduce((s,i)=>s+Number(i.val),0)
  const netAsset = totalAsset - totalDebt
  const totalIncome = incomes.reduce((s,i)=>s+Number(i.val),0)
  const totalExpense = expenses.reduce((s,i)=>s+Number(i.val),0)
  const balance = totalIncome - totalExpense

  document.getElementById('totalAsset').textContent = totalAsset.toFixed(2)
  document.getElementById('totalDebt').textContent = totalDebt.toFixed(2)
  document.getElementById('netAsset').textContent = netAsset.toFixed(2)
  document.getElementById('totalIncome').textContent = totalIncome.toFixed(2)
  document.getElementById('totalExpense').textContent = totalExpense.toFixed(2)
  document.getElementById('balance').textContent = balance.toFixed(2)
  document.getElementById('balance').className = 'number ' + (balance >= 0 ? 'green' : 'red')

  const updateChart = (chart, list) => {
    const names = [...new Set(list.map(i=>i.name))];
    const sums = names.map(n=>list.filter(i=>i.name===n).reduce((s,i)=>s+Number(i.val),0));
    chart.data.labels = names;
    chart.data.datasets[0].data = sums;
    chart.update();
  };

  updateChart(assetChart, assets);
  updateChart(debtChart, debts);
  updateChart(incomeChart, incomes);
  updateChart(expenseChart, expenses);

  localStorage.setItem('assets',JSON.stringify(assets))
  localStorage.setItem('debts',JSON.stringify(debts))
  localStorage.setItem('incomes',JSON.stringify(incomes))
  localStorage.setItem('expenses',JSON.stringify(expenses))

  const render = (id,data,edit,del)=>{
    const t=document.getElementById(id).querySelector('tbody');
    t.innerHTML=data.map((i,idx)=>`<tr><td>${i.name}</td><td>${Number(i.val).toFixed(2)}</td><td><button class="edit" onclick="${edit}(${idx})">修改</button> <button class="del" onclick="${del}(${idx})">删除</button></td></tr>`).join('')
  }
  render('assetTable',assets,'editAsset','delAsset')
  render('debtTable',debts,'editDebt','delDebt')
  render('incomeTable',incomes,'editIncome','delIncome')
  render('expenseTable',expenses,'editExpense','delExpense')

  // 生成评价
  generateEvaluation();
}

function delAsset(d){assets.splice(d,1);calc()}
function delDebt(d){debts.splice(d,1);calc()}
function delIncome(d){incomes.splice(d,1);calc()}
function delExpense(d){expenses.splice(d,1);calc()}

function editAsset(idx){const i=assets[idx];const p=prompt(`修改：${i.name}|${i.val}`,`${i.name}|${i.val}`);if(!p)return;const[n,v]=p.split('|');if(n&&!isNaN(v)){assets[idx]={name:n.trim(),val:Number(v)};calc()}}
function editDebt(idx){const i=debts[idx];const p=prompt(`修改：${i.name}|${i.val}`,`${i.name}|${i.val}`);if(!p)return;const[n,v]=p.split('|');if(n&&!isNaN(v)){debts[idx]={name:n.trim(),val:Number(v)};calc()}}
function editIncome(idx){const i=incomes[idx];const p=prompt(`修改：${i.name}|${i.val}`,`${i.name}|${i.val}`);if(!p)return;const[n,v]=p.split('|');if(n&&!isNaN(v)){incomes[idx]={name:n.trim(),val:Number(v)};calc()}}
function editExpense(idx){const i=expenses[idx];const p=prompt(`修改：${i.name}|${i.val}`,`${i.name}|${i.val}`);if(!p)return;const[n,v]=p.split('|');if(n&&!isNaN(v)){expenses[idx]={name:n.trim(),val:Number(v)};calc()}}

document.getElementById('assetForm').addEventListener('submit',e=>{e.preventDefault();const name=document.getElementById('assetName').value.trim();const val=document.getElementById('assetVal').value;assets.push({name,val});e.target.reset();calc()})

// ===== Google 登录逻辑 =====
function handleLogin(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const user = { name: payload.name, email: payload.email, avatar: payload.picture };
  localStorage.setItem('gUser', JSON.stringify(user));
  showUser(user);
  closeLoginModal();
}

function showUser(user) {
  document.getElementById('bar-guest').style.display = 'none';
  document.getElementById('bar-user').style.display = 'flex';
  document.getElementById('user-avatar').src = user.avatar;
  document.getElementById('user-name').textContent = user.name;
}

function handleLogout() {
  localStorage.removeItem('gUser');
  document.getElementById('bar-guest').style.display = 'block';
  document.getElementById('bar-user').style.display = 'none';
  google.accounts.id.disableAutoSelect();
}

function isLoggedIn() { return !!localStorage.getItem('gUser'); }

function requireLogin() {
  if (!isLoggedIn()) {
    document.getElementById('login-modal').classList.add('show');
    return false;
  }
  return true;
}

function closeLoginModal() {
  document.getElementById('login-modal').classList.remove('show');
}

const savedUser = localStorage.getItem('gUser');
if (savedUser) { showUser(JSON.parse(savedUser)); }
